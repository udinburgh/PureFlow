<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PureFlow Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>


 <!-- MAIN -->
  <main class="container" id="Dashboard">

    <h1 class="title">Dashboard</h1>
    <p class="subtitle">Setiap tetes berarti untuk planet kita</p>

    <!-- CARDS -->
    <section class="cards">
        <div class="card">
          <p>Penggunaan Hari Ini</p>
          <p class="big" id="totalAir">0 L</p>
      </div>

        <div class="card">
          <p>Perkiraan Biaya</p>
          <p class="big" id="biaya">Rp 0</p>
        </div>

      <div class="card status" id="statusCard">
        <p>Status</p>
        <p class="big" id="statusText">-</p>
      </div>

     </section>

    <!-- CONTENT -->
    <section class="content">

      <!-- INPUT -->
      <div class="box">
        <h3>Catat Penggunaan Air</h3>
      </div>

      <!-- LOKASI -->
      <div class="box">
        <h3>Lokasi & Cuaca</h3>

    
      </div>

    </section>

    <!-- RIWAYAT -->
    <section class="history">
      <h3>Riwayat Penggunaan</h3>

      <div id="emptyState" class="empty-state">
        <img src="https://cdn-icons-png.flaticon.com/512/4076/4076478.png">
        <p>Belum ada catatan</p>
      </div>

      <table id="table" style="display:none;">
        <thead>
          <tr>
            <th>Tanggal</th>
            <th>Alat</th>
            <th>Durasi</th>
            <th>Air</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>

    </section>


  </main>

</body>

<script>
  // Load statistik dari backend
  async function loadStatistik() {
    try {
      const res = await fetch('http://localhost:3000/api/statistik');
      const data = await res.json();

      document.getElementById('totalAir').innerText = data.totalDebit.toFixed(2) + " L";
      document.getElementById('biaya').innerText = "Rp " + (data.totalDebit * 4).toFixed(0);
      document.getElementById('statusText').innerText = "Aktif";

      const tbody = document.getElementById('tbody');
      tbody.innerHTML = "";
      if (data.data && data.data.length > 0) {
        document.getElementById('emptyState').style.display = "none";
        document.getElementById('table').style.display = "table";
        data.data.forEach(d => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${new Date(d.createdAt).toLocaleString()}</td>
            <td>${d.jenisAlat || "-"}</td>
            <td>${d.durasi || "-"} menit</td>
            <td>${d.konsumsi} L</td>
          `;
          tbody.appendChild(tr);
        });
      }
    } catch (err) {
      console.error("Error load statistik:", err);
    }
  }

  // Load cuaca dari backend
  async function loadWeather() {
    try {
      const res = await fetch('http://localhost:3000/api/weather?lokasi=Jakarta');
      const data = await res.json();
      if (data.error) {
        document.getElementById('weatherInfo').innerText = "Error: " + data.error;
        return;
      }
      document.getElementById('weatherInfo').innerText =
        `${data.lokasi}: ${data.kondisi}, Suhu ${data.suhu}°C, Kelembapan ${data.kelembapan}%`;
    } catch (err) {
      document.getElementById('weatherInfo').innerText = "Terjadi error: " + err.message;
    }
  }

  // Panggil saat halaman dibuka
  loadStatistik();
  loadWeather();
</script>

</body>
</html>
