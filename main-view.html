<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Main View - PureFlow</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Container untuk setiap bagian -->
    <div id="header"></div>
    <div id="user-input"></div>
    <div id="calculator"></div>
    <div id="statistik"></div>
    <div id="geolokasi"></div>
    <div id="footer"></div>

    <script>
      // Fungsi load partial view
      async function loadView(id, file) {
        try {
          const res = await fetch(file);
          const html = await res.text();
          document.getElementById(id).innerHTML = html;
        } catch (err) {
          console.error("Gagal load view:", file, err);
        }
      }

      // Load semua bagian
      loadView("header", "views/header.html");
      loadView("user-input", "views/user-input.html");
      loadView("calculator", "views/calculator.html");
      loadView("statistik", "views/statistik.html");
      loadView("geolokasi", "views/geolokasi.html");
      loadView("footer", "views/footer.html");
    </script>

    <!-- Script global untuk integrasi backend -->
    <script src="main.js"></script>
  </body>
</html>
